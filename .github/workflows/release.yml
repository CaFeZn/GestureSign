name: Release

on:
  push:
    branches:
      - master
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to create or update, for example v8.1.0"
        required: true
        type: string
      build_ref:
        description: "Git ref to build. Defaults to tag_name."
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2022

    steps:
      - name: Resolve release inputs
        id: resolve
        shell: pwsh
        run: |
          $isContinuous = $false

          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag_name }}"
            $buildRef = "${{ inputs.build_ref }}"
          } elseif ("${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
            $buildRef = $tag
          } else {
            $tag = "continuous"
            $buildRef = "${{ github.sha }}"
            $isContinuous = $true
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Release tag is empty."
          }

          if ($tag -eq "continuous") {
            $isContinuous = $true
          } elseif ($tag -notmatch '^v\d+\.\d+\.\d+(-[0-9A-Za-z.]+)?$') {
            throw "Release tag must look like v8.1.0 or v8.1.0-beta.1."
          }

          $artifact = "GestureSign-$tag-win-anycpu.zip"

          if ([string]::IsNullOrWhiteSpace($buildRef)) {
            if ($isContinuous) {
              $buildRef = "${{ github.sha }}"
            } else {
              $buildRef = $tag
            }
          }

          "release_tag=$tag" >> $env:GITHUB_OUTPUT
          "build_ref=$buildRef" >> $env:GITHUB_OUTPUT
          "artifact=$artifact" >> $env:GITHUB_OUTPUT
          "prerelease=$($isContinuous.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.build_ref }}

      - name: Update continuous tag
        if: steps.resolve.outputs.release_tag == 'continuous'
        shell: pwsh
        run: |
          git tag -f continuous ${{ steps.resolve.outputs.build_ref }}
          git push origin refs/tags/continuous --force

      - name: Clean release output
        shell: pwsh
        run: Remove-Item -Recurse -Force .\bin\Portable -ErrorAction SilentlyContinue

      - name: Build Portable
        shell: pwsh
        run: .\scripts\build.ps1 -Configuration Portable -Platform "Any CPU"

      - name: Package binaries
        shell: pwsh
        run: |
          $requiredFiles = @(
            ".\bin\Portable\GestureSign.ControlPanel.exe",
            ".\bin\Portable\GestureSign.exe",
            ".\bin\Portable\GestureSign.CorePlugins.dll"
          )

          foreach ($file in $requiredFiles) {
            if (-not (Test-Path $file)) {
              throw "Required release build output was not found: $file"
            }
          }

          Compress-Archive -Path .\bin\Portable\* -DestinationPath $env:ARTIFACT -Force
        env:
          ARTIFACT: ${{ steps.resolve.outputs.artifact }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: GestureSign-${{ steps.resolve.outputs.release_tag }}-win-anycpu
          path: ${{ steps.resolve.outputs.artifact }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve.outputs.release_tag }}
          name: GestureSign ${{ steps.resolve.outputs.release_tag }}
          target_commitish: ${{ steps.resolve.outputs.build_ref }}
          prerelease: ${{ steps.resolve.outputs.prerelease }}
          make_latest: ${{ steps.resolve.outputs.prerelease == 'true' && 'false' || 'legacy' }}
          generate_release_notes: true
          files: ${{ steps.resolve.outputs.artifact }}
