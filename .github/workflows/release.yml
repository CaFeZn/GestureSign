name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to create or update, for example v8.1.0"
        required: true
        type: string
      build_ref:
        description: "Git ref to build. Defaults to tag_name."
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2022

    steps:
      - name: Resolve release inputs
        id: resolve
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag_name }}"
            $buildRef = "${{ inputs.build_ref }}"
          } else {
            $tag = "${{ github.ref_name }}"
            $buildRef = $tag
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Release tag is empty."
          }

          if ($tag -notmatch '^v\d+\.\d+\.\d+(-[0-9A-Za-z.]+)?$') {
            throw "Release tag must look like v8.1.0 or v8.1.0-beta.1."
          }

          if ([string]::IsNullOrWhiteSpace($buildRef)) {
            $buildRef = $tag
          }

          $artifact = "GestureSign-$tag-win-anycpu.zip"

          "release_tag=$tag" >> $env:GITHUB_OUTPUT
          "build_ref=$buildRef" >> $env:GITHUB_OUTPUT
          "artifact=$artifact" >> $env:GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.build_ref }}

      - name: Clean release output
        shell: pwsh
        run: Remove-Item -Recurse -Force .\bin\Release -ErrorAction SilentlyContinue

      - name: Build Release
        shell: pwsh
        run: .\scripts\build.ps1 -Configuration Release -Platform "Any CPU"

      - name: Package binaries
        shell: pwsh
        run: |
          if (-not (Test-Path .\bin\Release\GestureSign.exe)) {
            throw "Release build output was not found."
          }

          Compress-Archive -Path .\bin\Release\* -DestinationPath $env:ARTIFACT -Force
        env:
          ARTIFACT: ${{ steps.resolve.outputs.artifact }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: GestureSign-${{ steps.resolve.outputs.release_tag }}-win-anycpu
          path: ${{ steps.resolve.outputs.artifact }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve.outputs.release_tag }}
          name: GestureSign ${{ steps.resolve.outputs.release_tag }}
          target_commitish: ${{ steps.resolve.outputs.build_ref }}
          generate_release_notes: true
          files: ${{ steps.resolve.outputs.artifact }}
