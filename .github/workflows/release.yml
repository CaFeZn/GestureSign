name: Release

on:
  push:
    branches:
      - master
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to create or update, for example v8.1.0"
        required: true
        type: string
      build_ref:
        description: "Git ref to build. Defaults to tag_name."
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2022

    steps:
      - name: Resolve release inputs
        id: resolve
        shell: pwsh
        run: |
          $isContinuous = $false

          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag_name }}"
            $buildRef = "${{ inputs.build_ref }}"
          } elseif ("${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
            $buildRef = $tag
          } else {
            $tag = "continuous"
            $buildRef = "${{ github.sha }}"
            $isContinuous = $true
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Release tag is empty."
          }

          if ($tag -eq "continuous") {
            $isContinuous = $true
          } elseif ($tag -notmatch '^v\d+\.\d+\.\d+(-[0-9A-Za-z.]+)?$') {
            throw "Release tag must look like v8.1.0 or v8.1.0-beta.1."
          }

          $portableArtifact = "GestureSign-$tag-portable-win-anycpu.zip"
          $installerArtifact = "GestureSign-$tag-setup-win-anycpu.exe"
          $version = $tag
          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }
          if ($tag -eq "continuous") {
            $version = "8.1.0-continuous"
          }

          if ([string]::IsNullOrWhiteSpace($buildRef)) {
            if ($isContinuous) {
              $buildRef = "${{ github.sha }}"
            } else {
              $buildRef = $tag
            }
          }

          "release_tag=$tag" >> $env:GITHUB_OUTPUT
          "build_ref=$buildRef" >> $env:GITHUB_OUTPUT
          "portable_artifact=$portableArtifact" >> $env:GITHUB_OUTPUT
          "installer_artifact=$installerArtifact" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "prerelease=$($isContinuous.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.build_ref }}

      - name: Update continuous tag
        if: steps.resolve.outputs.release_tag == 'continuous'
        shell: pwsh
        run: |
          git tag -f continuous ${{ steps.resolve.outputs.build_ref }}
          git push origin refs/tags/continuous --force

      - name: Clean release output
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force .\bin\Release -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force .\bin\Portable -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force .\artifacts -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force .\artifacts | Out-Null

      - name: Build Release
        shell: pwsh
        run: .\scripts\build.ps1 -Configuration Release -Platform "Any CPU"

      - name: Build Portable
        shell: pwsh
        run: .\scripts\build.ps1 -Configuration Portable -Platform "Any CPU" -SkipRestore

      - name: Validate build outputs
        shell: pwsh
        run: |
          $requiredReleaseFiles = @(
            ".\bin\Release\GestureSign.ControlPanel.exe",
            ".\bin\Release\GestureSign.exe",
            ".\bin\Release\GestureSign.CorePlugins.dll"
          )
          $requiredPortableFiles = @(
            ".\bin\Portable\GestureSign.ControlPanel.exe",
            ".\bin\Portable\GestureSign.exe",
            ".\bin\Portable\GestureSign.CorePlugins.dll"
          )

          foreach ($file in $requiredReleaseFiles + $requiredPortableFiles) {
            if (-not (Test-Path $file)) {
              throw "Required release build output was not found: $file"
            }
          }

      - name: Package portable zip
        shell: pwsh
        run: Compress-Archive -Path .\bin\Portable\* -DestinationPath $env:PORTABLE_ARTIFACT -Force
        env:
          PORTABLE_ARTIFACT: ${{ steps.resolve.outputs.portable_artifact }}

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Package installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = (Get-Command ISCC.exe -ErrorAction Stop).Source
          }

          $sourceDir = (Resolve-Path .\bin\Release).Path
          $outputDir = (Resolve-Path .\artifacts).Path
          $outputBaseFilename = [IO.Path]::GetFileNameWithoutExtension("${{ steps.resolve.outputs.installer_artifact }}")

          & $iscc `
            .\installer\GestureSign.iss `
            "/DSourceDir=$sourceDir" `
            "/DOutputDir=$outputDir" `
            "/DOutputBaseFilename=$outputBaseFilename" `
            "/DReleaseTag=${{ steps.resolve.outputs.release_tag }}" `
            "/DAppVersion=${{ steps.resolve.outputs.version }}"

          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Remove legacy release asset name
        if: steps.resolve.outputs.release_tag == 'continuous'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete-asset continuous GestureSign-continuous-win-anycpu.zip --yes --repo ${{ github.repository }} 2>$null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Legacy release asset was not present."
            exit 0
          }

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: GestureSign-${{ steps.resolve.outputs.release_tag }}-win-anycpu
          path: |
            ${{ steps.resolve.outputs.portable_artifact }}
            artifacts/${{ steps.resolve.outputs.installer_artifact }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve.outputs.release_tag }}
          name: GestureSign ${{ steps.resolve.outputs.release_tag }}
          target_commitish: ${{ steps.resolve.outputs.build_ref }}
          prerelease: ${{ steps.resolve.outputs.prerelease }}
          make_latest: ${{ steps.resolve.outputs.prerelease == 'true' && 'false' || 'legacy' }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            ${{ steps.resolve.outputs.portable_artifact }}
            artifacts/${{ steps.resolve.outputs.installer_artifact }}
